<rect x="284" y="152" width="15" height="186" fill="#ffffff" opacity="0.05" rx="1.5"/>

<!-- Bottom vent -->
<rect x="164" y="332" width="186" height="13" rx="1.5" fill="#c0c5cc" stroke="#aab0b8" stroke-width="0.6"/>
<line x1="172" y1="335" x2="342" y2="335" stroke="#aab0b8" stroke-width="0.6"/>
<line x1="172" y1="339" x2="342" y2="339" stroke="#aab0b8" stroke-width="0.6"/>
<line x1="172" y1="343" x2="342" y2="343" stroke="#aab0b8" stroke-width="0.6"/>

<!-- ── AI BADGE ── -->
<circle cx="390" cy="106" r="42" fill="#0f1117" stroke="#e05c2a" stroke-width="3"/>
<circle cx="390" cy="106" r="33" fill="none" stroke="#1a1f2e" stroke-width="0.8"/>
<!-- Circuit lines -->
<line x1="368" y1="106" x2="412" y2="106" stroke="#2a3050" stroke-width="0.8" opacity="0.8"/>
<line x1="390" y1="84" x2="390" y2="128" stroke="#2a3050" stroke-width="0.8" opacity="0.8"/>
<circle cx="368" cy="106" r="2" fill="#e05c2a" opacity="0.8"/>
<circle cx="412" cy="106" r="2" fill="#e05c2a" opacity="0.8"/>
<circle cx="390" cy="84" r="2" fill="#e05c2a" opacity="0.8"/>
<circle cx="390" cy="128" r="2" fill="#e05c2a" opacity="0.8"/>
<!-- AI label -->
<text x="390" y="102" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#e05c2a" text-anchor="middle">AI</text>
<text x="390" y="116" font-family="Arial,sans-serif" font-size="7" fill="#7b87a8" text-anchor="middle" letter-spacing="1.2">POWERED</text>

<!-- Bottom label -->
<text x="256" y="466" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#e05c2a" text-anchor="middle" letter-spacing="2.5">NIBE SMART CONTROL</text>

</g>
