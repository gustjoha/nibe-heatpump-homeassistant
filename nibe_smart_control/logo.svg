<circle cx="348" cy="388" r="3" fill="#1f3a1f" opacity="0.5"/>
<circle cx="408" cy="418" r="2.5" fill="#1f3a1f" opacity="0.4"/>
<circle cx="120" cy="438" r="2.5" fill="#152a15" opacity="0.4"/>
<circle cx="290" cy="432" r="3" fill="#152a15" opacity="0.3"/>
<circle cx="380" cy="446" r="2.5" fill="#152a15" opacity="0.3"/>

