<ellipse cx="297" cy="157" rx="4.5" ry="5.5" fill="#2a7a3a" opacity="0.9"/>
<ellipse cx="312" cy="157" rx="4.5" ry="5.5" fill="#3a6ab8" opacity="0.9"/>
<ellipse cx="327" cy="157" rx="4.5" ry="5.5" fill="#8a3ab8" opacity="0.9"/>
