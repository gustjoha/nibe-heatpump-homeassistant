<line x1="160" y1="362" x2="160" y2="470" stroke="#2563a8" stroke-width="5.5" stroke-linecap="round"/>
<line x1="172" y1="362" x2="172" y2="470" stroke="#3a82f7" stroke-width="3" stroke-linecap="round"/>
<path d="M160 470 Q166 492 172 470" fill="none" stroke="#3a82f7" stroke-width="4" stroke-linecap="round"/>
<!-- Centre -->
<line x1="250" y1="362" x2="250" y2="484" stroke="#2563a8" stroke-width="5.5" stroke-linecap="round"/>
<line x1="262" y1="362" x2="262" y2="484" stroke="#3a82f7" stroke-width="3" stroke-linecap="round"/>
<path d="M250 484 Q256 506 262 484" fill="none" stroke="#3a82f7" stroke-width="4" stroke-linecap="round"/>
<!-- Right -->
<line x1="340" y1="362" x2="340" y2="470" stroke="#2563a8" stroke-width="5.5" stroke-linecap="round"/>
<line x1="352" y1="362" x2="352" y2="470" stroke="#3a82f7" stroke-width="3" stroke-linecap="round"/>
<path d="M340 470 Q346 492 352 470" fill="none" stroke="#3a82f7" stroke-width="4" stroke-linecap="round"/>

<!-- Manifold header -->
<rect x="128" y="355" width="256" height="11" rx="5" fill="#1e3a6e" stroke="#3a82f7" stroke-width="1.2"/>

<!-- Ground surface -->
<rect x="32" y="356" width="448" height="9" fill="#2a3a2a"/>

<!-- Pipes rising into unit -->
<rect x="198" y="282" width="8" height="78" rx="3" fill="#3a82f7" opacity="0.8"/>
<rect x="306" y="282" width="8" height="78" rx="3" fill="#3a82f7" opacity="0.8"/>

<!-- Thermal arrows -->
<path d="M234 342 L234 318" fill="none" stroke="#e05c2a" stroke-width="1.8" opacity="0.8" marker-end="url(#ah)"/>
<path d="M278" y1="345" fill="none"/>
<path d="M278 340 L278 316" fill="none" stroke="#e05c2a" stroke-width="1.8" opacity="0.8" marker-end="url(#ah)"/>

<!-- ── F1245 CABINET ── -->
<!-- Plinth -->
<rect x="162" y="342" width="188" height="17" rx="2.5" fill="#1e2228"/>
<!-- Left panel -->
<rect x="164" y="134" width="114" height="212" rx="3" fill="url(#cl)" stroke="#b8bfc7" stroke-width="0.8"/>
<!-- Right panel -->
<rect x="278" y="134" width="72" height="212" rx="3" fill="url(#cr)" stroke="#7a8088" stroke-width="0.8"/>
<!-- Centre trim -->
<rect x="275" y="134" width="5" height="212" fill="#9aa0a8"/>
