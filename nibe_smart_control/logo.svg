<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
<defs>
  <clipPath id="cc"><circle cx="256" cy="256" r="224"/></clipPath>
  <linearGradient id="cl" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#c8cdd4"/>
    <stop offset="100%" stop-color="#e2e6ea"/>
  </linearGradient>
  <linearGradient id="cr" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#8a9099"/>
    <stop offset="60%" stop-color="#b0b8c1"/>
    <stop offset="100%" stop-color="#7a8088"/>
  </linearGradient>
  <linearGradient id="gd" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1a2a1a"/>
    <stop offset="100%" stop-color="#0d150d"/>
