<rect x="162" y="130" width="188" height="8" rx="2.5" fill="#b0b5bc" stroke="#9aa0a8" stroke-width="0.8"/>

<!-- NIBE diamond on left panel -->
<g transform="translate(184,154)">
  <polygon points="8,0 16,8 8,16 0,8" fill="none" stroke="#6a7280" stroke-width="1"/>
  <polygon points="8,3 13,8 8,13 3,8" fill="#6a7280"/>
</g>
<text x="206" y="168" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#4a5260" letter-spacing="2">NIBE</text>

