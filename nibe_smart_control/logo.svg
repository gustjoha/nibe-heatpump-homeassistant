  <marker id="ah" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M1 1L7 4L1 7" fill="none" stroke="#e05c2a" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Background disc -->
<circle cx="256" cy="256" r="256" fill="#0f1117"/>
<circle cx="256" cy="256" r="224" fill="none" stroke="#e05c2a" stroke-width="5.5"/>

<g clip-path="url(#cc)">

<!-- Underground section -->
<rect x="32" y="362" width="448" height="200" fill="url(#gd)"/>
<line x1="32" y1="378" x2="480" y2="378" stroke="#1f3a1f" stroke-width="1.2" opacity="0.7"/>
