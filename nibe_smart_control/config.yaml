name: "Nibe Smart Control"
description: "Intelligent heat curve control for Nibe F-series heat pumps. Adjusts heating based on weather forecast, indoor temperature and electricity price. Includes a web dashboard with history and charts."
version: "1.2.0"
slug: "nibe_smart_control"
init: false
arch:
  - aarch64
  - amd64

homeassistant_api: true
auth_api: true
ingress: true
ingress_port: 8099
panel_icon: mdi:heat-pump
panel_title: Nibe Smart Control

options:
  log_level: "info"

schema:
  log_level: list(debug|info|warning|error)

map:
  - share:rw
